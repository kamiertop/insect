datasets_path = "./data/datasets/昆虫纲"
data_root = "./data"
log_dir = "./logs"

[train]
epochs = 10
batch_size = 16
num_workers = 2
lr = 0.0001
weight_decay = 0.0001
seed = 42
fine_tune = false
save_dir = "./checkpoints"
max_train_steps = 0
max_val_steps = 0

[train.early_stopping]
enabled = true
patience = 5
min_delta = 0.0

